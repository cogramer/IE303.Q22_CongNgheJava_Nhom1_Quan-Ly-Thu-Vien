<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>Forgot Password</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
        
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>

    <body class="auth-body">
        <div class="auth-card">
            <div class="auth-title">
                Forgot Password
            </div>

            <form id="resetPasswordForm">

                <div class="input-group custom-input">
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                    <i class="bi bi-person-fill"></i>
                </div>

                <div class="input-group custom-input">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                    <i class="bi bi-envelope-fill"></i>
                </div>

                <div class="input-group custom-input">
                    <input type="password" id="newPassword" class="form-control" placeholder="Nhập mật khẩu mới" required>
                    <i class="bi bi-key-fill"></i>
                </div>
 
                <button class="auth-btn mb-4" type="button" id="sendOtpBtn" onclick="sendOtp()" style="background-color: #6c757d; color: white;">
                    Nhận mã OTP qua Email
                </button>

                <div class="input-group custom-input" id="otpContainer" style="display: none">
                    <input type="text" id="otp" class="form-control" placeholder="Nhập mã OTP" required>
                    <i class="bi bi-shield-lock-fill"></i>
                </div>

                <hr style="border-color: #ddd;"> 

                <button class="auth-btn" type="button" id="resetBtn" onclick="resetPassword()">
                    Xác nhận & Đổi mật khẩu
                </button>

            </form>

            <div class="text-center auth-footer-text mt-3">
                Remember your password?
                <a th:href="@{/login}">Login</a>
            </div>

        </div>

        <script>
        // HÀM 1: XỬ LÝ GỬI MÃ OTP
        async function sendOtp() {
            const form = document.getElementById("resetPasswordForm");
            const username = document.getElementById("username");
            const email = document.getElementById("email");
            const newPassword = document.getElementById("newPassword");
            const otpContainer = document.getElementById("otpContainer");
            const sendOtpBtn = document.getElementById("sendOtpBtn");

            // Chỉ check 3 trường đầu tiên khi bấm Gửi OTP
            if (!username.value || !email.value || !newPassword.value) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Thiếu thông tin',
                    text: 'Vui lòng nhập Username, Email và Mật khẩu mới trước khi nhận mã OTP!',
                });
                return;
            }

            sendOtpBtn.innerText = "Đang gửi...";
            sendOtpBtn.disabled = true;

            try {
                const res = await fetch("/forgotPasswordProcess", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username: username.value, 
                        email: email.value 
                    })
                });

                const data = await res.json();
                sendOtpBtn.disabled = false;

                if (!res.ok) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi',
                        text: data.message || 'Lỗi hệ thống!',
                        confirmButtonColor: '#d33'
                    });
                    sendOtpBtn.innerText = "Nhận mã OTP qua Email";
                    return;
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Thành công!',
                    text: data.message || 'Gửi OTP thành công! Vui lòng kiểm tra email.',
                    confirmButtonColor: '#28a745'
                });
                
                // Hiện ô OTP và khóa 3 ô nhập liệu
                otpContainer.style.display = "flex";
                username.readOnly = true;
                email.readOnly = true;
                newPassword.readOnly = true;

                // THIẾT LẬP ĐẾM NGƯỢC (Giả sử 60 giây)
                let countdown = 60; 
                sendOtpBtn.disabled = true; // Khóa nút ngay lập tức
                sendOtpBtn.innerText = `Vui lòng chờ (${countdown}s)`;

                const timerInterval = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        sendOtpBtn.innerText = `Mã OTP hết hạn sau: (${countdown}s)`;
                    } else {
                        // Hết thời gian thì mở khóa nút
                        clearInterval(timerInterval);
                        sendOtpBtn.disabled = false;
                        sendOtpBtn.innerText = "Gửi lại mã OTP";
                    }
                }, 1000); // 1000ms = 1 giây

            } catch (error) {
                sendOtpBtn.disabled = false;
                sendOtpBtn.innerText = "Nhận mã OTP qua Email";
                Swal.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối!',
                    text: 'Không thể kết nối đến server!',
                    confirmButtonColor: '#d33'
                });
            }
        }

        // HÀM 2: XÁC NHẬN VÀ ĐỔI MẬT KHẨU
        async function resetPassword() {
            const form = document.getElementById("resetPasswordForm");
            const email = document.getElementById("email").value;
            const newPassword = document.getElementById("newPassword").value;
            const otp = document.getElementById("otp").value;
            const resetBtn = document.getElementById("resetBtn");

            if (!otp) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Thiếu mã OTP',
                    text: 'Vui lòng nhập mã OTP đã được gửi về email!',
                });
                return;
            }

            resetBtn.innerText = "Đang xác nhận...";
            resetBtn.disabled = true;

            try {
                const res = await fetch("/verifyOtpAndResetPassword", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({  
                        email: email,
                        otp: otp, 
                        newPassword: newPassword 
                    })
                });

                const data = await res.json();
                resetBtn.disabled = false;

                if (!res.ok) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Xác thực thất bại!',
                        text: data.message || 'Mã OTP không đúng hoặc có lỗi xảy ra!',
                        confirmButtonColor: '#d33'
                    });
                    resetBtn.innerText = "Xác nhận & Đổi mật khẩu";
                    return;
                }

                // Thành công
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công!',
                    text: data.message || 'Đổi mật khẩu thành công! Đang chuyển hướng...',
                    timer: 1000, 
                    timerProgressBar: true, 
                    showConfirmButton: false 
                }).then(() => {
                    window.location.href = "/login"; 
                });

            } catch (error) {
                resetBtn.disabled = false;
                resetBtn.innerText = "Xác nhận & Đổi mật khẩu";
                Swal.fire({
                    icon: 'error',
                    title: 'Lỗi kết nối!',
                    text: 'Không thể kết nối đến server!',
                    confirmButtonColor: '#d33'
                });
            }
        }
        </script>
    </body>
</html>
