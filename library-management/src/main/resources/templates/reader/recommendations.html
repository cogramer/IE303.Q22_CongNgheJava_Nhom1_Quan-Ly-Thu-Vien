<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gợi ý sách - HCMC Lib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">

    <!-- Tiêu đề -->
    <div class="mb-4">
        <h3 class="section-title">Gợi ý dành cho bạn</h3>
        <p class="text-muted">
            Dựa trên lịch sử mượn sách của bạn và những độc giả có sở thích tương tự.
        </p>
    </div>

    <!-- Không có gợi ý -->
    <div th:if="${books == null or #lists.isEmpty(books)}"
         class="text-center py-5">
        <i class="bi bi-stars fs-1 text-muted"></i>
        <p class="mt-3 text-muted">
            Chưa có gợi ý nào. Hãy mượn thêm sách để hệ thống học sở thích của bạn!
        </p>
        <a th:href="@{/reader/books}" class="btn btn-primary">
            Xem danh sách sách
        </a>
    </div>

    <!-- Danh sách gợi ý -->
    <div class="book-cards-row" th:if="${books != null and !#lists.isEmpty(books)}">
        <div class="book-card-col" th:each="book : ${books}">
            <div class="card book-card h-100 shadow-sm">

                <!-- Ảnh bìa -->
                <img
                    th:src="${book.imageUrl != null} ? @{${book.imageUrl}} : @{/img/banner_1.jpg}"
                    class="card-img-top book-img"
                    alt="Ảnh bìa sách"
                />

                <!-- Badge AI -->
                <span class="badge bg-warning text-dark position-absolute top-0 end-0 m-2">
                    AI gợi ý
                </span>

                <div class="card-body d-flex flex-column">

                    <h6 class="book-title" th:text="${book.title}"></h6>
                    <p class="text-muted mb-1" th:text="${book.author}"></p>

                    <p class="text-muted small mb-1">
                        <i class="bi bi-tag"></i>
                        <span th:text="${book.categoryName}"></span>
                    </p>

                    <p class="small mb-2">
                        <span th:if="${book.availableCopies > 0}"
                              class="text-success">
                            <i class="bi bi-check-circle"></i>
                            Còn <span th:text="${book.availableCopies}"></span> cuốn
                        </span>
                        <span th:if="${book.availableCopies == 0}"
                              class="text-danger">
                            <i class="bi bi-x-circle"></i>
                            Hết sách
                        </span>
                    </p>

                    <!-- Nút đặt giữ nếu còn sách -->
                    <div class="mt-auto">
                        <form th:if="${book.availableCopies > 0}"
                              th:action="@{/reservations/create}"
                              method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}"/>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-bookmark-plus"></i> Đặt giữ
                            </button>
                        </form>
                        <button th:if="${book.availableCopies == 0}"
                                class="btn btn-secondary w-100" disabled>
                            Hết sách
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Xem thêm -->
    <div class="text-center mt-5" th:if="${books != null and !#lists.isEmpty(books)}">
        <a th:href="@{/reader/books}" class="btn btn-outline-primary">
            <i class="bi bi-grid"></i> Xem tất cả sách
        </a>
    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
