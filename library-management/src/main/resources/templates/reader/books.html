<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách sách - HCMC Lib</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/library.css}">
    <link rel="stylesheet" th:href="@{/css/books.css}">
</head>

<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="books-page">
        <section
            id="topBooksCarousel"
            class="carousel slide top-books-carousel"
            data-bs-ride="carousel"
            th:if="${featuredBooks != null and !#lists.isEmpty(featuredBooks)}"
        >
            <div class="carousel-indicators">
                <button
                    th:each="book, stat : ${featuredBooks}"
                    type="button"
                    data-bs-target="#topBooksCarousel"
                    th:attr="data-bs-slide-to=${stat.index}, aria-label='Sách nổi bật ' + ${stat.index + 1}, aria-current=${stat.index == 0 ? 'true' : null}"
                    th:classappend="${stat.index == 0} ? 'active'"
                ></button>
            </div>

            <div class="carousel-inner">
                <div
                    class="carousel-item"
                    th:each="book, stat : ${featuredBooks}"
                    th:classappend="${stat.index == 0} ? 'active'"
                >
                    <img
                        th:src="${book.imageUrl != null} ? @{${book.imageUrl}} : @{/img/banner_1.jpg}"
                        class="d-block w-100"
                        th:alt="${book.title}"
                    >
                    <div class="carousel-caption">
                        <span class="eyebrow">Sách nổi bật</span>
                        <h1 th:text="${book.title}">Tên sách</h1>
                        <p th:text="${book.author}">Tác giả</p>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#topBooksCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#topBooksCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </section>

        <div class="container py-4">
            <section class="filter-bar mb-4">
                <input
                    id="book-search"
                    class="form-control"
                    type="search"
                    placeholder="Tìm kiếm theo tên sách hoặc tác giả"
                    aria-label="Tìm kiếm sách"
                >

                <select id="category-filter" class="form-select" aria-label="Lọc theo thể loại">
                    <option value="">Tất cả thể loại</option>
                </select>

                <select id="availability-filter" class="form-select" aria-label="Lọc theo trạng thái">
                    <option value="">Tất cả trạng thái</option>
                    <option value="available">Còn sách</option>
                    <option value="unavailable">Hết sách</option>
                </select>
            </section>

            <section>
                <div id="books-grid" class="books-grid">
                    <article
                        class="book-list-card"
                        th:each="book : ${books}"
                        th:data-id="${book.id}"
                        th:data-title="${book.title}"
                        th:data-author="${book.author}"
                        th:data-category="${book.categoryName != null ? book.categoryName : 'Chưa phân loại'}"
                        th:data-available="${book.availableCopies}"
                        th:data-total="${book.totalCopies}"
                        th:data-isbn="${book.isbn}"
                        th:data-image="${book.imageUrl != null ? book.imageUrl : '/img/banner_1.jpg'}"
                        th:data-price="${book.price != null ? book.price : ''}"
                        th:data-rating="${4 + (book.id % 10) / 10.0}"
                    >
                        <div class="book-cover-wrap">
                            <img
                                th:src="${book.imageUrl != null} ? @{${book.imageUrl}} : @{/img/banner_1.jpg}"
                                th:alt="${book.title}"
                                class="book-cover"
                            >
                            <span class="book-badge" th:if="${book.availableCopies > 0}">Còn sách</span>
                            <span class="book-badge is-muted" th:if="${book.availableCopies <= 0}">Hết sách</span>
                        </div>

                        <div class="book-card-body">
                            <div class="rating" aria-label="Đánh giá">★★★★★</div>
                            <h3 th:text="${book.title}">Tên sách</h3>
                            <p class="book-author" th:text="${book.author}">Tác giả</p>
                            <p class="book-meta">
                                <span th:text="${book.categoryName != null ? book.categoryName : 'Chưa phân loại'}">Thể loại</span>
                                <span th:text="${book.availableCopies + '/' + book.totalCopies + ' cuốn'}">0/0 cuốn</span>
                            </p>
                            <div class="book-actions">
                                <button
                                    class="btn btn-primary btn-sm borrow-book-btn"
                                    type="button"
                                    th:disabled="${book.availableCopies <= 0}"
                                >
                                    Đặt giữ
                                </button>
                            </div>
                        </div>
                    </article>
                </div>

                <div id="empty-state" class="empty-state is-hidden">
                    Không tìm thấy sách phù hợp.
                </div>

                <nav class="pagination-wrap" aria-label="Phân trang danh sách sách">
                    <button id="prev-page" class="btn btn-outline-primary" type="button">Trước</button>
                    <span id="page-info"></span>
                    <button id="next-page" class="btn btn-outline-primary" type="button">Sau</button>
                </nav>
            </section>
        </div>
    </main>

    <div class="modal fade" id="borrowConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content book-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận đặt giữ sách</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3">
                        Bạn có chắc muốn đặt giữ sách
                        <strong id="confirm-book-title"></strong>
                        không?
                    </p>
                    <div class="borrow-confirm-info">
                        <div>
                            <span>Ngày đặt</span>
                            <strong id="confirm-borrow-date"></strong>
                        </div>
                        <div>
                            <span>Trạng thái</span>
                            <strong id="confirm-due-date"></strong>
                        </div>
                    </div>
                    <div id="borrow-confirm-message" class="mt-3"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button id="confirm-borrow-btn" type="button" class="btn btn-primary">Xác nhận đặt giữ</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/library.js}"></script>
    <script th:src="@{/js/books.js}"></script>
</body>

</html>
