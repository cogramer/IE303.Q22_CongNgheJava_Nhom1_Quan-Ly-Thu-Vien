<!DOCTYPE html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

```
<meta charset="UTF-8">
<title>Login</title>

<!-- Bootstrap -->
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
>

<!-- Bootstrap icons -->
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
>

<!-- Google font -->
<link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet"
>

<!-- Custom CSS -->
<link
    rel="stylesheet"

>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
```

</head>

<body class="auth-body">

<div class="auth-card">

```
<div class="auth-title">
    Login
</div>

<div
    th:if="${error}"
    class="alert alert-danger"
>
    <p th:text="${error}"></p>
</div>

<form onsubmit="login(event)">

    <div class="input-group custom-input">

        <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Username"
            required
        >

        <i class="bi bi-person-fill"></i>

    </div>

    <div class="input-group custom-input">

        <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Password"
            required
        >

        <i class="bi bi-lock-fill"></i>

    </div>

    <div class="d-flex justify-content-between extra-options mb-3">

        <label>
            <input type="checkbox" id="rememberMeCheckBox">
            Remember me
        </label>

        <a th:href="@{/forgotPassword}">
            Forgot password?
        </a>

    </div>

    <button
        class="auth-btn"
        type="submit"
    >
        Login
    </button>

</form>

<div class="text-center auth-footer-text">

    Don't have an account?

    <a th:href="@{/register}">
        Register
    </a>

</div>
```

</div>

<script>

async function login(event) {

    event.preventDefault()

    const username = document.getElementById("username").value
    const password = document.getElementById("password").value
    const rememberMe = document.getElementById("rememberMeCheckBox").checked.toString()

    const res = await fetch("/loginProcess", {

        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({ username, password, rememberMe})

    })

    const data = await res.json();

    if (!res.ok) {
        Swal.fire({
            icon: 'error',
            title: 'Thất bại!',
            text: data.message || 'Tên đăng nhập hoặc mật khẩu không đúng!',
            confirmButtonColor: '#d33'
        });
        return;
    }

    Swal.fire({
        icon: 'success',
        title: 'Thành công!',
        text: data.message || 'Đăng nhập thành công!',
        confirmButtonColor: '#28a745',
        timer: 1000,
        showConfirmButton: false
    }).then(() => {
        window.location.href = "/home";
    });
}

</script>

</body>
</html>
