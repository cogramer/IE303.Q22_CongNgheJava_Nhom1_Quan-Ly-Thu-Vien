<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Trang chủ - HCMC Lib</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        th:href="@{/css/style.css}"
    >

</head>


<body>

<!-- =============================
NAVBAR
============================= -->

<div th:replace="fragments/header :: header"></div>


<!-- =============================
MAIN CONTENT
============================= -->

<div class="container mt-4">


    <!-- =============================
    BANNER
    ============================== -->

    <div
        id="homeBanner"
        class="carousel slide mb-4"
        data-bs-ride="carousel"
    >


        <!-- INDICATORS (4 chấm tròn) -->

        <div class="carousel-indicators">

            <button
                type="button"
                data-bs-target="#homeBanner"
                data-bs-slide-to="0"
                class="active"
            ></button>

            <button
                type="button"
                data-bs-target="#homeBanner"
                data-bs-slide-to="1"
            ></button>

            <button
                type="button"
                data-bs-target="#homeBanner"
                data-bs-slide-to="2"
            ></button>

            <button
                type="button"
                data-bs-target="#homeBanner"
                data-bs-slide-to="3"
            ></button>

        </div>


        <!-- SLIDES -->

        <div class="carousel-inner rounded">


            <!-- SLIDE 1 -->

            <div class="carousel-item active">

                <img
                    th:src="@{/img/banner_1.jpg}"
                    class="d-block w-100"
                    alt="Banner 1"
                >

            </div>


            <!-- SLIDE 2 -->

            <div class="carousel-item">

                <img
                    th:src="@{/img/banner_2.jpg}"
                    class="d-block w-100"
                    alt="Banner 2"
                >

            </div>


            <!-- SLIDE 3 -->

            <div class="carousel-item">

                <img
                    th:src="@{/img/banner_3.jpg}"
                    class="d-block w-100"
                    alt="Banner 3"
                >

            </div>


            <!-- SLIDE 4 -->

            <div class="carousel-item">

                <img
                    th:src="@{/img/banner_4.jpg}"
                    class="d-block w-100"
                    alt="Banner 4"
                >

            </div>


        </div>


        <!-- NÚT TRÁI -->

        <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#homeBanner"
            data-bs-slide="prev"
        >

            <span class="carousel-control-prev-icon"></span>

        </button>


        <!-- NÚT PHẢI -->

        <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#homeBanner"
            data-bs-slide="next"
        >

            <span class="carousel-control-next-icon"></span>

        </button>


    </div>



    <div class="row">
        <!-- =============================
        MAIN BOOK AREA
        ============================== -->

        <div class="col-md-9">

            <!-- =============================
            FEATURED BOOKS
            ============================= -->

            <section class="book-section container mt-5">

                <h3 class="section-title">
                    Sách nổi bật
                </h3>

                <div class="row g-4">

                    <div
                        class="col-xl-3 col-lg-4 col-md-6"
                        th:each="book : ${featuredBooks}"
                    >

                        <div class="card book-card h-100 shadow-sm">

                            <!-- BOOK IMAGE -->
                            <img
                                th:src="${book.imageUrl != null} ?
                                        ${book.imageUrl} :
                                        @{/img/banner_1.jpg}"
                                class="card-img-top book-img"
                            />

                            <!-- BODY -->
                            <div class="card-body d-flex flex-column">

                                <h6
                                    class="book-title"
                                    th:text="${book.title}"
                                ></h6>

                                <p
                                    class="book-price"
                                    th:text="${book.price} + 'đ'"
                                ></p>

                                <a
                                    class="btn btn-primary mt-auto"
                                    th:href="@{/books/{id}(id=${book.id})}"
                                >
                                    Mượn
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </section>

            <!-- =============================
            NEW BOOKS
            ============================= -->

            <section class="book-section container mt-5">

                <h3 class="section-title">
                    Sách mới
                </h3>

                <div class="row g-4">

                    <div
                        class="col-xl-3 col-lg-4 col-md-6"
                        th:each="book : ${newBooks}"
                    >

                        <div class="card book-card h-100 shadow-sm">

                            <img
                                th:src="${book.imageUrl != null} ?
                                        ${book.imageUrl} :
                                        @{/img/banner_1.jpg}"
                                class="card-img-top book-img"
                            />

                            <div class="card-body d-flex flex-column">

                                <h6
                                    class="book-title"
                                    th:text="${book.title}"
                                ></h6>

                                <p
                                    class="book-price"
                                    th:text="${book.price} + 'đ'"
                                ></p>

                                <a
                                    class="btn btn-primary mt-auto"
                                    th:href="@{/books/{id}(id=${book.id})}"
                                >
                                    Mượn
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </section>

</div>

<!-- =============================
FOOTER
============================== -->
<div th:replace="fragments/footer :: footer"></div>


<!-- Bootstrap JS -->

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>


</body>
</html>
