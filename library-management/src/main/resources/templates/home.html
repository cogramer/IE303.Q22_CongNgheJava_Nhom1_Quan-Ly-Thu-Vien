<!DOCTYPE html>
<html>
    <head>
        <title>Home</title>
    </head>
    <body>
        <h2>Home Page</h2>
        <button onclick="callApi()">Gọi API /home</button>
        <button onclick="logout()">Logout</button>
        <p id="result"></p>
        <script>
            function callApi() {
                fetch("/home", {
                    method: "GET",
                    credentials: "include"  // gửi kèm cookie tự động
                })
                .then(res => {
                    if (res.status === 401) {
                        throw new Error("Token không hợp lệ hoặc hết hạn");
                    }
                    return res.text();
                })
                .then(data => {
                    document.getElementById("result").innerText = data;
                })
                .catch(err => {
                    document.getElementById("result").innerText = "Lỗi: " + err.message;
                });
            }

            function logout() {
                fetch("/logout", {
                    method: "POST",
                    credentials: "include"
                }).then(() => {
                    window.location.href = "/login";
                });
            }
        </script>
    </body>
</html>
