<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="header"
     class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >

    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold"
           th:href="@{/reader/home}">
            HCMC Lib
        </a>


        <!-- MOBILE BUTTON -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">

            <span class="navbar-toggler-icon"></span>

        </button>


        <!-- MENU -->
        <div class="collapse navbar-collapse"
             id="navbarContent">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       data-nav-path="/home"
                       th:href="@{/reader/home}">
                        Trang chủ
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       data-nav-path="/reader/books"
                       th:href="@{/reader/books}">
                        Danh sách sách
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                    data-nav-path="/reader/recommendations"
                    th:href="@{/reader/recommendations}">
                        <i class="bi bi-stars"></i> Gợi ý cho tôi
                    </a>

                </li>

            </ul>


            <!-- RIGHT MENU -->

            <!-- CHƯA LOGIN -->
            <ul class="navbar-nav"
                th:if="${username == null}">

                <li class="nav-item">

                    <a class="nav-link"
                       th:href="@{/login}">
                        Đăng nhập
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       th:href="@{/register}">
                        Đăng ký
                    </a>

                </li>

            </ul>


            <!-- ĐÃ LOGIN -->
            <ul class="navbar-nav"
                th:if="${username != null}">

                <!-- CART -->
                <li class="nav-item">

                    <a class="nav-link"
                       data-nav-path="/reader/borrow"
                       th:href="@{/reader/borrow}">
                        Giỏ sách
                    </a>

                </li>


                <!-- USER DROPDOWN -->
                <li class="nav-item dropdown">

                    <a class="nav-link dropdown-toggle"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        Xin chào,
                        <span th:text="${username}"></span>

                    </a>


                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>

                            <a class="dropdown-item"
                               th:href="@{/profile}">
                                Thông tin tài khoản
                            </a>

                        </li>

                        <li>

                            <a class="dropdown-item"
                               data-nav-path="/reader/history"
                               th:href="@{/reader/history}">
                                Lịch sử mượn sách
                            </a>

                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>

                            <form th:action="@{/logout}" method="post" style="margin: 0;">
                                <button type="submit" class="dropdown-item text-danger">
                                    Đăng xuất
                                </button>
                            </form>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const currentPath = window.location.pathname;

        document.querySelectorAll("[data-nav-path]").forEach(link => {
            const navPath = link.getAttribute("data-nav-path");
            const isActive = currentPath === navPath
                || (navPath !== "/home" && currentPath.startsWith(`${navPath}/`));

            if (isActive) {
                link.classList.add("active");
                link.setAttribute("aria-current", "page");
            }
        });
    });
</script>

</nav>

</body>
</html>
